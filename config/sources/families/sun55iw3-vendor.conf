ARCH="arm64"

LINUXFAMILY="sun55iw3-vendor"

IMAGE_PARTITION_TABLE="msdos"
BOOTFS_TYPE="fat"
BOOTSIZE="512"
OFFSET="32"
EXTRAWIFI="no"
KERNEL_BTF="no"
ATF_COMPILE="no"
INSTALL_HEADERS="yes"

case "${BRANCH}" in

	legacy)
		KERNELSOURCE='https://github.com/chainsx/linux-sun55iw3-vendor.git'
		# This is Allwinner's new BSP kernel,
		# which consists of a specific version of the mainline kernel source code and a folder containing BSP driver source code files.
		KERNELBRANCH="branch:linux-5.15-a527"
		declare -g KERNEL_MAJOR_MINOR="5.15"
		KERNELPATCHDIR="${LINUXFAMILY}-${BRANCH}"
		LINUXCONFIG="linux-${LINUXFAMILY}-${BRANCH}"

		;;
		
	vendor)
		KERNELSOURCE='https://github.com/chainsx/linux-sun55iw3-vendor.git'
		# This is Allwinner's new BSP kernel,
		# which consists of a specific version of the mainline kernel source code and a folder containing BSP driver source code files.
		KERNELBRANCH="branch:linux-6.6"
		declare -g KERNEL_MAJOR_MINOR="6.6"
		KERNELPATCHDIR="${LINUXFAMILY}-${BRANCH}"
		LINUXCONFIG="linux-${LINUXFAMILY}-${BRANCH}"

		;;

esac

write_uboot_platform() {
	dd if=$SRC/packages/blobs/sunxi/sun55iw3-vendor/boot0_sdcard.fex of=$2 bs=8k seek=1 conv=notrunc
	dd if=$SRC/packages/blobs/sunxi/sun55iw3-vendor/boot_package.fex of=$2 bs=8k seek=2050 conv=notrunc
}
