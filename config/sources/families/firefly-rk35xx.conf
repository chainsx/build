# shellcheck source=config/sources/families/include/rockchip64_common.inc
source "${BASH_SOURCE%/*}/include/rockchip64_common.inc"

BOOTSOURCE='https://github.com/chainsx/u-boot-firefly-rk356x-vendor.git'
BOOTBRANCH='branch:main'
BOOTPATCHDIR="legacy/u-boot-firefly-rk35xx"
OVERLAY_PREFIX='rk35xx'

case $BRANCH in

	legacy)
		display_alert "WARNING: 'legacy' branch" "is deprecated and slated for removal. Please switch to another branch unless you know what you're doing :)" "wrn"
		BOOTDIR='u-boot-rockchip64'
		declare -g KERNEL_MAJOR_MINOR="5.10"
		declare -g -i KERNEL_GIT_CACHE_TTL=120
		KERNELSOURCE='https://github.com/chainsx/kernel-firefly-rk356x-vendor.git'
		KERNELBRANCH='branch:5.10'
		KERNELPATCHDIR='rk35xx-legacy'
		
		;;
esac

prepare_boot_configuration

function pre_config_uboot_target__firefly_prepare_firmware() {
	local bl31_relative="${BL31_BLOB:-rk35/rk3568_bl31_v1.44.elf}"
	local bl32_relative="${BL32_BLOB:-rk35/rk3568_bl32_v2.11.bin}"

	local bl31_source="${RKBIN_DIR}/${bl31_relative}"
	local bl32_source="${RKBIN_DIR}/${bl32_relative}"

	display_alert \
		"Preparing Firefly vendor U-Boot firmware" \
		"BL31=${bl31_relative}, BL32=${bl32_relative}" \
		"info"

	if [[ ! -s "${bl31_source}" ]]; then
		exit_with_error \
			"RK3568 BL31 firmware was not found" \
			"${bl31_source}"
	fi

	if [[ ! -s "${bl32_source}" ]]; then
		exit_with_error \
			"RK3568 BL32/OP-TEE firmware was not found" \
			"${bl32_source}"
	fi

	# Firefly vendor U-Boot uses hard-coded filenames.
	install -m 0644 "${bl31_source}" ./bl31.elf
	install -m 0644 "${bl32_source}" ./tee.bin

	if [[ ! -s ./bl31.elf ]]; then
		exit_with_error \
			"Failed to prepare BL31 for Firefly vendor U-Boot" \
			"$(pwd)/bl31.elf"
	fi

	if [[ ! -s ./tee.bin ]]; then
		exit_with_error \
			"Failed to prepare BL32/OP-TEE for Firefly vendor U-Boot" \
			"$(pwd)/tee.bin"
	fi

	display_alert \
		"Firefly firmware prepared" \
		"$(pwd)/bl31.elf and $(pwd)/tee.bin" \
		"info"
}

family_tweaks_bsp() {
	:
}
